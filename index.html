    <style>
        :root {
            --espresso: #1a1512;
            --burnt-sienna: #A0522D;
            --white-bg: #ffffff;
            --overlay: rgba(255, 255, 255, 0.88);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            font-family: 'Oswald', sans-serif;
            color: var(--espresso);
            overflow-x: hidden;
            /* Using your uploaded sunset ranch road image as the main background */
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)), 
                        url(https://mail.google.com/mail/u/0?ui=2&ik=0479339bf6&attid=0.1&permmsgid=msg-a:r-8293707162819817155&th=19c88ad2bc8889dd&view=att&disp=safe&realattid=f_mlynmdje0&zw);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* --- Sticky Header --- */
        header {
    background-color: var(--white-bg);
    padding: 0.5rem 5%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 3px solid var(--burnt-sienna);
    position: sticky;
    top: 0;
    z-index: 1000;
}
  

        .logo-link {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .main-logo {
            /* Large sizing for the DCRW Skull Logo */
            height: 180px; 
            width: auto;
            display: block;
        }

        nav a {
            color: var(--burnt-sienna);
            text-decoration: none;
            margin-left: 45px;
            text-transform: uppercase;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 2px;
            transition: transform 0.2s ease;
        }

        nav a:hover {
            transform: scale(1.1);
        }

        /* --- Hero Section --- */
        .hero {
            height: 75vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .hero h1 {
            font-family: 'Rye', serif;
            font-size: 6.5rem;
            margin: 0;
            letter-spacing: 5px;
            text-shadow: 4px 4px 15px rgba(0,0,0,0.9);
            animation: fadeInUp 1.2s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Shop Section --- */
        .shop {
            padding: 5rem 5% 12rem 5%;
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 50px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* --- Frosted Glass Product Cards --- */
        .card {
            background: var(--overlay);
            backdrop-filter: blur(8px);
            padding: 25px;
            border: 2px solid var(--burnt-sienna);
            border-radius: 2px;
            transition: all 0.4s ease;
            opacity: 0; /* Scroll Reveal starting point */
            transform: translateY(40px);
        }

        .card.active {
            opacity: 1;
            transform: translateY(0);
        }

        .card img {
            width: 100%;
            height: 450px;
            object-fit: cover;
            filter: sepia(15%);
        }

        .card h3 {
            font-size: 2.4rem;
            margin: 20px 0 5px 0;
            font-family: 'Rye', serif;
            color: var(--espresso);
        }

        .price {
            font-size: 2rem;
            color: var(--burnt-sienna);
            font-weight: bold;
            margin-bottom: 20px;
        }

        .buy-btn {
            display: inline-block;
            background: var(--burnt-sienna);
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            font-size: 1.4rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        footer {
            background: var(--espresso);
            color: white;
            padding: 5rem;
            text-align: center;
            font-size: 1.4rem;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>

        </a>

            <a href="#shop">Shop</a>

    <section class="hero">

    Ranch Wear for the Bold
</p>

    <section id="shop" class="shop">
        <div class="grid">
            <div class="card reveal">
                <img src="https://mail.google.com/mail/u/0?ui=2&ik=0479339bf6&attid=0.3&permmsgid=msg-a:r2722496164685569894&th=19c88b8bb1837021&view=att&disp=safe&realattid=19c88b8a448ebe0bbce1&zw" alt="Hat">

    <footer>

    </footer>

    <script>
        function reveal() {
            var reveals = document.querySelectorAll(".reveal");
            for (var i = 0; i < reveals.length; i++) {
                var windowHeight = window.innerHeight;
                var elementTop = reveals[i].getBoundingClientRect().top;
                var elementVisible = 100;
                if (elementTop < windowHeight - elementVisible) {
                    reveals[i].classList.add("active");
                }
            }
        }
        window.addEventListener("scroll", reveal);
        reveal();
    </script>
